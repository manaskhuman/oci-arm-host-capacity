name: Create OCI Instance
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Create OCI private key file
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > /home/runner/oci_key.pem
          chmod 600 /home/runner/oci_key.pem
      - name: Install dependencies
        run: composer update --prefer-dist --no-progress
      - name: Try to create instance
        run: php run.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /home/runner/oci_key.pem
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
```

---

## Key Differences:
| Old | New |
|---|---|
| Runs PHPUnit tests | Runs `php run.php` directly |
| Tests code quality | Actually tries to create VM |
| Always fails without OCI mock | Retries every 5 mins for real |
| `workflow_dispatch` missing | ✅ Can trigger manually too |

